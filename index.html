<!DOCTYPE html>
<html>
<head>
    <title>Contoh Halaman HTML</title>
</head>
<body>

    <!-- Heading -->
    <h1>Judul Utama</h1>
    <h2>Sub Judul</h2>

    <!-- Paragraf -->
    <p>Ini adalah contoh paragraf pada halaman web.</p>

    <!-- Link -->
    <p>Kunjungi <a href="https://google.com">Google</a></p>

    <!-- Gambar -->
    <img src="gambar.jpg" alt="Contoh gambar" width="200">

    <!-- List -->
    <h3>Daftar Buah:</h3>
    <ul>
        <li>Apel</li>
        <li>Jeruk</li>
        <li>Mangga</li>
    </ul>

    <!-- Div -->
    <div style="background-color: lightgray; padding: 10px;">
        <p>Ini adalah contoh penggunaan div untuk mengelompokkan elemen.</p>
    </div>

</body>
</html>
